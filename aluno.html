<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MentorCR - Aluno</title>
    <script>
        (function() {
            const d = localStorage.getItem('mentorcr_session');
            if (!d) { window.location.href = 'index.html'; return; }
            try {
                const s = JSON.parse(d);
                if (Date.now() - s.timestamp > 7200000) { localStorage.removeItem('mentorcr_session'); window.location.href = 'index.html'; return; }
                if (s.tipo !== 'aluno') { window.location.href = 'index.html'; return; }
            } catch(e) { window.location.href = 'index.html'; }
        })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="loading" id="loading"><div class="spinner"></div></div>

<nav class="sidebar">
    <div class="sidebar-logo"><svg viewBox="0 0 30 30"><rect x="2" y="2" width="26" height="26" rx="7" fill="#3b82f6"/><text x="15" y="20" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">CR</text></svg><span>MentorCR</span></div>
    <div class="sidebar-user"><div class="sidebar-avatar" id="sidebarAvatar">A</div><div class="sidebar-user-info"><div class="sidebar-user-name" id="sidebarNome">Aluno</div><div class="sidebar-user-role">Discente</div></div></div>
    <div class="sidebar-nav" id="sidebarNav">
        <button class="active" data-section="turma"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/></svg>Minha Turma</button>
        <button data-section="encontros"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Encontros</button>
        <button data-section="trabalhos"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Trabalhos <span style="margin-left:auto;font-size:9px;background:var(--primary-light);color:var(--primary);padding:2px 7px;border-radius:10px" id="sideContador">0/2</span></button>
        <button data-section="financeiro"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>Financeiro</button>
        <button data-section="biblioteca"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>Biblioteca</button>
        <button data-section="perfil"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>Perfil</button>
    </div>
    <div class="sidebar-footer"><button onclick="logout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sair</button></div>
</nav>

<main class="main">
    <header class="header"><div class="header-left"><h1>Aluno</h1><p>Acompanhe sua turma, encontros e trabalhos</p></div><div class="header-right"><div class="header-search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" placeholder="Buscar..."></div><div class="header-notify"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg><span class="dot"></span></div></div></header>
    <div class="content">
        <div id="section-turma"><h2>Minha Turma</h2><div id="infoTurma"></div></div>
        <div id="section-encontros" class="hidden"><h2>Encontros</h2><div class="table-container"><table><thead><tr><th>Data</th><th>Horario</th><th>Google Meet</th><th>Material</th></tr></thead><tbody id="tabelaEncontros"></tbody></table></div></div>
        <div id="section-trabalhos" class="hidden"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h2 style="margin:0">Meus Trabalhos (<span id="contador">0/2</span>)</h2><button class="btn btn-primary" id="btnEnviar" onclick="openModal('modalEnvio')">+ Enviar Trabalho</button></div><div class="table-container"><table><thead><tr><th>Trabalho</th><th>Envio</th><th>Status</th><th>Barema</th><th>Devolutiva</th><th>Arquivo Corrigido</th></tr></thead><tbody id="tabelaTrabalhos"></tbody></table></div></div>
        <div id="section-financeiro" class="hidden"><h2>Financeiro</h2><div class="table-container"><table><thead><tr><th>Referencia</th><th>Valor</th><th>Vencimento</th><th>Status</th></tr></thead><tbody id="tabelaFinanceiro"></tbody></table></div></div>
        <div id="section-biblioteca" class="hidden"><h2>Biblioteca</h2><div class="biblioteca-grid" id="gridBiblioteca"></div></div>
        <div id="section-perfil" class="hidden"><h2>Perfil</h2><div class="profile-section"><div><div class="profile-avatar" id="alunoAvatar">A</div><input type="file" id="alunoPhoto" accept="image/*" style="display:none" onchange="atualizarFoto()"><button class="btn btn-outline btn-sm" onclick="document.getElementById('alunoPhoto').click()" style="margin-top:8px">Alterar Foto</button></div><div class="profile-info"><div class="form-group"><label>Nome</label><input type="text" id="alunoNomePerfil"></div><div class="form-group"><label>Email</label><input type="email" id="alunoEmailPerfil"></div><div class="form-group"><label>Nova Senha</label><input type="password" id="alunoSenhaPerfil" placeholder="Manter atual"></div><button class="btn btn-primary" onclick="salvarPerfil()">Salvar Alteracoes</button></div></div></div>
    </div>
</main>

<div id="modalEnvio" class="modal"><div class="modal-content"><div class="modal-header"><h3>Enviar Trabalho</h3><button class="modal-close" onclick="closeModal('modalEnvio')">&times;</button></div><form id="formEnvio"><div class="form-group"><label>Titulo do Trabalho</label><input type="text" id="trabTitulo" required></div><div class="form-group"><label>Arquivo (PDF, DOCX, etc)</label><input type="file" id="trabArquivo" required></div><button type="submit" class="btn btn-primary" style="width:100%">Enviar para Revisao</button></form></div></div>

<script src="supabase.js"></script>
<script>
const userId=localStorage.getItem('mentorcr_user_id'),userNome=localStorage.getItem('mentorcr_user_nome');
currentUserId=userId;$('sidebarNome').textContent=userNome||'Aluno';$('sidebarAvatar').textContent=(userNome||'A').charAt(0).toUpperCase();

document.querySelectorAll('#sidebarNav button').forEach(btn=>{btn.addEventListener('click',function(){document.querySelectorAll('#sidebarNav button').forEach(b=>b.classList.remove('active'));this.classList.add('active');const s=this.dataset.section;document.querySelectorAll('[id^="section-"]').forEach(x=>x.classList.add('hidden'));const t=$('section-'+s);if(t)t.classList.remove('hidden');const a={turma:carregarTurma,encontros:carregarEncontros,trabalhos:carregarTrabalhos,financeiro:carregarFinanceiro,biblioteca:carregarBiblioteca,perfil:carregarPerfil};if(a[s])a[s]()})});
async function carregarContadorSidebar(){const{data:tr}=await sb.from('trabalhos').select('data_envio').eq('aluno_id',currentUserId);const mes=new Date().getMonth();const tm=tr?tr.filter(t=>new Date(t.data_envio).getMonth()===mes):[];$('sideContador').textContent=`${tm.length}/2`}
async function carregarTurma(){const{data:a}=await sb.from('alunos').select('turma_id').eq('id',currentUserId).single();if(!a||!a.turma_id){$('infoTurma').innerHTML='<div class="empty-state">Voce nao esta matriculado em nenhuma turma</div>';return}const{data:t}=await sb.from('turmas').select('*').eq('id',a.turma_id).single();if(!t){$('infoTurma').innerHTML='<div class="empty-state">Turma nao encontrada</div>';return}const{data:p}=await sb.from('professores').select('nome').eq('id',t.professor_id).single();$('infoTurma').innerHTML=`<div class="stat-card stat-blue" style="max-width:500px;flex-direction:column;align-items:flex-start;cursor:default"><div class="stat-icon" style="margin-bottom:8px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/></svg></div><div class="stat-label">${t.nome}</div><div class="stat-value" style="font-size:14px;font-weight:400">${t.descricao}</div><div style="font-size:10px;color:var(--text-light);margin-top:4px">Professor: ${p?p.nome:'-'} | Carga: ${t.carga} | R$ ${Number(t.valor).toFixed(2)}</div></div>`}
async function carregarEncontros(){const{data:a}=await sb.from('alunos').select('turma_id').eq('id',currentUserId).single();if(!a||!a.turma_id){$('tabelaEncontros').innerHTML='<tr><td colspan="4" class="empty-state">Voce nao esta matriculado</td></tr>';return}const{data:e}=await sb.from('encontros').select('*').eq('turma_id',a.turma_id).order('data',{ascending:true});$('tabelaEncontros').innerHTML=(!e||e.length===0)?'<tr><td colspan="4" class="empty-state">Nenhum encontro agendado</td></tr>':e.map(x=>`<tr><td>${x.data}</td><td>${x.hora}</td><td><a href="${x.link_meet}" target="_blank">Acessar Meet</a></td><td><a href="${x.link_material}" target="_blank">Acessar Material</a></td></tr>`).join('')}
async function enviarTrabalho(e){e.preventDefault();const{data:tr}=await sb.from('trabalhos').select('data_envio').eq('aluno_id',currentUserId);const mes=new Date().getMonth();const tm=tr?tr.filter(t=>new Date(t.data_envio).getMonth()===mes):[];if(tm.length>=2){alert('Limite de 2 trabalhos por mes atingido!');return}const{data:a}=await sb.from('alunos').select('turma_id').eq('id',currentUserId).single();const arq=$('trabArquivo');if(!arq.files[0]){alert('Selecione um arquivo.');return}const reader=new FileReader();reader.onload=async function(ev){showLoading();await sb.from('trabalhos').insert({id:uid(),aluno_id:currentUserId,turma_id:a?a.turma_id:null,titulo:$('trabTitulo').value,data_envio:new Date().toISOString().split('T')[0],status:'aguardando',arquivo_original:ev.target.result,nome_arquivo_original:arq.files[0].name});hideLoading();closeModal('modalEnvio');$('formEnvio').reset();carregarTrabalhos();carregarContadorSidebar();toast('Trabalho enviado com sucesso!')};reader.readAsDataURL(arq.files[0])}
async function carregarTrabalhos(){const{data:tr}=await sb.from('trabalhos').select('*').eq('aluno_id',currentUserId).order('created_at',{ascending:false});const mes=new Date().getMonth();const tm=tr?tr.filter(t=>new Date(t.data_envio).getMonth()===mes):[];$('contador').textContent=`${tm.length}/2`;$('btnEnviar').disabled=tm.length>=2;$('sideContador').textContent=`${tm.length}/2`;$('tabelaTrabalhos').innerHTML=(!tr||tr.length===0)?'<tr><td colspan="6" class="empty-state">Nenhum trabalho enviado</td></tr>':tr.map(t=>{let b='-';if(t.barema)b=`${(t.barema.clareza||0)+(t.barema.fundamentacao||0)+(t.barema.estrutura||0)+(t.barema.originalidade||0)}/40`;const st=t.status==='devolvido'?'<span class="badge badge-success">Devolvido</span>':'<span class="badge badge-warning">Aguardando</span>';const down=t.status==='devolvido'&&t.arquivo_corrigido?`<button class="btn btn-outline btn-xs" onclick="baixarArquivo('${t.id}')">Download</button>`:'-';return`<tr><td>${t.titulo}</td><td>${t.data_envio}</td><td>${st}</td><td>${b}</td><td style="max-width:130px;overflow:hidden;text-overflow:ellipsis">${t.devolutiva||'-'}</td><td>${down}</td></tr>`}).join('')}
async function baixarArquivo(tid){const{data:t}=await sb.from('trabalhos').select('*').eq('id',tid).single();if(!t||!t.arquivo_corrigido){alert('Arquivo nao disponivel.');return}const a=document.createElement('a');a.href=t.arquivo_corrigido;a.download=t.nome_arquivo_corrigido||'trabalho_corrigido';document.body.appendChild(a);a.click();document.body.removeChild(a)}
async function carregarFinanceiro(){const{data:p}=await sb.from('pagamentos').select('*').eq('aluno_id',currentUserId);if(!p||p.length===0){$('tabelaFinanceiro').innerHTML='<tr><td colspan="4" class="empty-state">Nenhum registro financeiro</td></tr>';return}const{data:t}=await sb.from('turmas').select('id,nome');const mt={};if(t)t.forEach(x=>mt[x.id]=x.nome);$('tabelaFinanceiro').innerHTML=p.map(x=>`<tr><td>${mt[x.turma_id]||'-'}</td><td>R$ ${Number(x.valor).toFixed(2)}</td><td>${x.vencimento}</td><td>${x.status==='pago'?'<span class="badge badge-success">Pago</span>':'<span class="badge badge-warning">Pendente</span>'}</td></tr>`).join('')}
async function carregarBiblioteca(){const{data}=await sb.from('biblioteca').select('*').order('created_at',{ascending:false});if(!data||data.length===0){$('gridBiblioteca').innerHTML='<div class="empty-state" style="grid-column:1/-1">Nenhum material disponivel</div>';return}const artigos=data.filter(b=>b.tipo==='artigo');const livros=data.filter(b=>b.tipo==='livro');let h='';if(livros.length>0){h+='<div style="grid-column:1/-1;margin-top:8px"><h3 style="font-size:14px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg> Livros</h3></div>';h+=livros.map(b=>`<div class="bib-item bib-livro"><div class="bib-tipo-badge livro">Livro</div><h4>${b.titulo}</h4><p><strong>Autor:</strong> ${b.autor}</p>${b.editora?`<p><strong>Editora:</strong> ${b.editora}</p>`:''}${b.ano?`<p><strong>Ano:</strong> ${b.ano}</p>`:''}<a href="${b.link}" target="_blank">Acessar Material</a></div>`).join('')}if(artigos.length>0){h+='<div style="grid-column:1/-1;margin-top:8px"><h3 style="font-size:14px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> Artigos</h3></div>';h+=artigos.map(b=>`<div class="bib-item bib-artigo"><div class="bib-tipo-badge artigo">Artigo</div><h4>${b.titulo}</h4><p><strong>Autor:</strong> ${b.autor}</p><a href="${b.link}" target="_blank">Acessar Material</a></div>`).join('')}$('gridBiblioteca').innerHTML=h}
async function carregarPerfil(){const{data}=await sb.from('alunos').select('*').eq('id',currentUserId).single();if(data){$('alunoNomePerfil').value=data.nome;$('alunoEmailPerfil').value=data.email}const{data:ft}=await sb.from('fotos_perfil').select('foto_base64').eq('user_key','aluno_'+currentUserId).single();const el=$('alunoAvatar');const se=$('sidebarAvatar');el.innerHTML=ft?`<img src="${ft.foto_base64}" style="width:100%;height:100%;object-fit:cover">`:(userNome||'A').charAt(0).toUpperCase();se.innerHTML=ft?`<img src="${ft.foto_base64}" style="width:100%;height:100%;object-fit:cover">`:(userNome||'A').charAt(0).toUpperCase()}
async function atualizarFoto(){const f=$('alunoPhoto').files[0];if(!f)return;const r=new FileReader();r.onload=async e=>{showLoading();await sb.from('fotos_perfil').upsert({id:uid(),user_key:'aluno_'+currentUserId,foto_base64:e.target.result},{onConflict:'user_key'});hideLoading();carregarPerfil();toast('Foto atualizada!')};r.readAsDataURL(f)}
async function salvarPerfil(){const d={nome:$('alunoNomePerfil').value,email:$('alunoEmailPerfil').value};const s=$('alunoSenhaPerfil').value;if(s)d.senha=s;showLoading();await sb.from('alunos').update(d).eq('id',currentUserId);hideLoading();$('sidebarNome').textContent=d.nome;localStorage.setItem('mentorcr_user_nome',d.nome);toast('Perfil atualizado!')}
$('formEnvio').addEventListener('submit',enviarTrabalho);
carregarTurma();carregarContadorSidebar();
</script>
</body>
</html>
