<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MentorCR - Aluno</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg-pattern"></div>
<div class="loading" id="loading"><div class="spinner"></div></div>

<div class="panel-header">
    <div class="brand"><svg viewBox="0 0 30 30"><rect x="2" y="2" width="26" height="26" rx="7" fill="url(#grad)"/><text x="15" y="19" text-anchor="middle" fill="#0f1923" font-size="11" font-weight="700">CR</text><defs><linearGradient id="grad"><stop offset="0%" stop-color="#5eead4"/><stop offset="100%" stop-color="#818cf8"/></linearGradient></defs></svg><h2>MentorCR - Aluno</h2></div>
    <div style="display:flex;align-items:center;gap:10px"><span id="nomeHeader" style="font-size:11px;color:var(--text-secondary)"></span><button class="btn-logout" onclick="logout()">Sair</button></div>
</div>

<div class="panel-content">
    <div class="tabs" id="alunoTabs">
        <button class="tab active" data-tab="turma">Minha Turma</button>
        <button class="tab" data-tab="encontros">Encontros</button>
        <button class="tab" data-tab="trabalhos">Trabalhos</button>
        <button class="tab" data-tab="financeiro">Financeiro</button>
        <button class="tab" data-tab="biblioteca">Biblioteca</button>
    </div>

    <div id="turma" class="tab-content active"><h3 class="section-title">Minha Turma</h3><div id="infoTurma"></div></div>
    <div id="encontros" class="tab-content"><h3 class="section-title">Encontros</h3><div class="table-container"><table><thead><tr><th>Data</th><th>Horario</th><th>Meet</th><th>Material</th></tr></thead><tbody id="tabelaEncontros"></tbody></table></div></div>
    <div id="trabalhos" class="tab-content"><div style="display:flex;justify-content:space-between;margin-bottom:14px"><h3 class="section-title">Trabalhos (<span id="contador">0/2</span>)</h3><button class="btn btn-primary" id="btnEnviar" onclick="openModal('modalEnvio')">Enviar</button></div><div class="table-container"><table><thead><tr><th>Trabalho</th><th>Envio</th><th>Status</th><th>Nota</th><th>Devolutiva</th></tr></thead><tbody id="tabelaTrabalhos"></tbody></table></div></div>
    <div id="financeiro" class="tab-content"><h3 class="section-title">Financeiro</h3><div class="table-container"><table><thead><tr><th>Referencia</th><th>Valor</th><th>Vencimento</th><th>Status</th></tr></thead><tbody id="tabelaFinanceiro"></tbody></table></div></div>
    <div id="biblioteca" class="tab-content"><h3 class="section-title">Biblioteca</h3><div class="biblioteca-grid" id="gridBiblioteca"></div></div>
</div>

<div id="modalEnvio" class="modal"><div class="modal-content"><div class="modal-header"><h3>Enviar Trabalho</h3><button class="modal-close" onclick="closeModal('modalEnvio')">&times;</button></div><form id="formEnvio"><div class="form-group"><label>Titulo</label><input type="text" id="trabTitulo" required></div><div class="form-group"><label>Arquivo</label><input type="file" id="trabArquivo" required></div><button type="submit" class="btn btn-primary" style="width:100%">Enviar</button></form></div></div>

<div class="footer">Criado por <span>Matheus Pacifico Evangelista</span> | <a href="https://wa.me/5579996458399" style="color:#34d399;text-decoration:none">(79) 99645-8399</a></div>

<script src="supabase.js"></script>
<script src="style.js"></script>
<script>
    const userId = localStorage.getItem('mentorcr_user_id');
    const userNome = localStorage.getItem('mentorcr_user_nome');
    if (!userId) window.location.href = 'index.html';
    currentUserId = userId;
    $('nomeHeader').textContent = userNome || 'Aluno';

    document.querySelectorAll('#alunoTabs .tab').forEach(tab => {
        tab.addEventListener('click', function() {
            document.querySelectorAll('#alunoTabs .tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            this.classList.add('active');
            const target = $(this.dataset.tab);
            if (target) target.classList.add('active');
            if (this.dataset.tab === 'turma') carregarTurma();
            else if (this.dataset.tab === 'encontros') carregarEncontros();
            else if (this.dataset.tab === 'trabalhos') carregarTrabalhos();
            else if (this.dataset.tab === 'financeiro') carregarFinanceiro();
            else if (this.dataset.tab === 'biblioteca') carregarBiblioteca();
        });
    });

    async function carregarTurma() {
        const { data: a } = await sb.from('alunos').select('turma_id').eq('id', currentUserId).single();
        if (!a || !a.turma_id) { $('infoTurma').innerHTML = '<div class="empty-state">Nao matriculado</div>'; return; }
        const { data: t } = await sb.from('turmas').select('*').eq('id', a.turma_id).single();
        if (!t) { $('infoTurma').innerHTML = '<div class="empty-state">Turma nao encontrada</div>'; return; }
        const { data: p } = await sb.from('professores').select('nome').eq('id', t.professor_id).single();
        $('infoTurma').innerHTML = `<div class="card" style="max-width:450px"><div class="card-icon" style="background:rgba(94,234,212,.12);color:var(--primary)">T</div><h3>${t.nome}</h3><p style="font-size:12px;color:var(--text-secondary)">${t.descricao}</p><p style="font-size:11px"><b>Professor:</b> ${p ? p.nome : '-'} | <b>Carga:</b> ${t.carga} | <b>Valor:</b> R$ ${Number(t.valor).toFixed(2)}</p></div>`;
    }

    async function carregarEncontros() {
        const { data: a } = await sb.from('alunos').select('turma_id').eq('id', currentUserId).single();
        if (!a || !a.turma_id) { $('tabelaEncontros').innerHTML = '<tr><td colspan="4" class="empty-state">Nao matriculado</td></tr>'; return; }
        const { data: e } = await sb.from('encontros').select('*').eq('turma_id', a.turma_id).order('data', { ascending: true });
        $('tabelaEncontros').innerHTML = (!e || e.length === 0) ? '<tr><td colspan="4" class="empty-state">Nenhum encontro</td></tr>' : e.map(x => `<tr><td>${x.data}</td><td>${x.hora}</td><td><a href="${x.link_meet}" target="_blank">Meet</a></td><td><a href="${x.link_material}" target="_blank">Material</a></td></tr>`).join('');
    }

    async function enviarTrabalho(e) {
        e.preventDefault();
        const { data: tr } = await sb.from('trabalhos').select('data_envio').eq('aluno_id', currentUserId);
        const mes = new Date().getMonth();
        const tm = tr ? tr.filter(t => new Date(t.data_envio).getMonth() === mes) : [];
        if (tm.length >= 2) { alert('Limite de 2 trabalhos por mes!'); return; }
        const { data: a } = await sb.from('alunos').select('turma_id').eq('id', currentUserId).single();
        const arq = $('trabArquivo');
        if (!arq.files[0]) { alert('Selecione um arquivo.'); return; }
        const reader = new FileReader();
        reader.onload = async function(ev) {
            showLoading();
            await sb.from('trabalhos').insert({ id: uid(), aluno_id: currentUserId, turma_id: a ? a.turma_id : null, titulo: $('trabTitulo').value, data_envio: new Date().toISOString().split('T')[0], status: 'aguardando', arquivo_original: ev.target.result, nome_arquivo_original: arq.files[0].name });
            hideLoading();
            closeModal('modalEnvio'); $('formEnvio').reset();
            carregarTrabalhos(); toast('Trabalho enviado!');
        };
        reader.readAsDataURL(arq.files[0]);
    }

    async function carregarTrabalhos() {
        const { data: tr } = await sb.from('trabalhos').select('*').eq('aluno_id', currentUserId).order('created_at', { ascending: false });
        const mes = new Date().getMonth();
        const tm = tr ? tr.filter(t => new Date(t.data_envio).getMonth() === mes) : [];
        $('contador').textContent = `${tm.length}/2`;
        $('btnEnviar').disabled = tm.length >= 2;
        $('tabelaTrabalhos').innerHTML = (!tr || tr.length === 0) ? '<tr><td colspan="5" class="empty-state">Nenhum trabalho</td></tr>' : tr.map(t => { let b = '-'; if (t.barema) b = `${(t.barema.clareza || 0) + (t.barema.fundamentacao || 0) + (t.barema.estrutura || 0) + (t.barema.originalidade || 0)}/40`; return `<tr><td>${t.titulo}</td><td>${t.data_envio}</td><td>${t.status === 'devolvido' ? '<span class="badge badge-success">Devolvido</span>' : '<span class="badge badge-warning">Aguardando</span>'}</td><td>${b}</td><td>${t.devolutiva || '-'}</td></tr>`; }).join('');
    }

    async function carregarFinanceiro() {
        const { data: p } = await sb.from('pagamentos').select('*').eq('aluno_id', currentUserId);
        if (!p || p.length === 0) { $('tabelaFinanceiro').innerHTML = '<tr><td colspan="4" class="empty-state">Nenhum registro</td></tr>'; return; }
        const { data: t } = await sb.from('turmas').select('id,nome');
        const mt = {}; if (t) t.forEach(x => mt[x.id] = x.nome);
        $('tabelaFinanceiro').innerHTML = p.map(x => `<tr><td>${mt[x.turma_id] || '-'}</td><td>R$ ${Number(x.valor).toFixed(2)}</td><td>${x.vencimento}</td><td>${x.status === 'pago' ? '<span class="badge badge-success">Pago</span>' : '<span class="badge badge-warning">Pendente</span>'}</td></tr>`).join('');
    }

    async function carregarBiblioteca() {
        const { data } = await sb.from('biblioteca').select('*').order('created_at', { ascending: false });
        $('gridBiblioteca').innerHTML = (!data || data.length === 0) ? '<div class="empty-state">Nenhum material</div>' : data.map(b => `<div class="biblioteca-item"><h4>${b.titulo}</h4><p>${b.descricao}</p><a href="${b.link}" target="_blank">Acessar</a></div>`).join('');
    }

    $('formEnvio').addEventListener('submit', enviarTrabalho);
    carregarTurma();
</script>
</body>
</html>
