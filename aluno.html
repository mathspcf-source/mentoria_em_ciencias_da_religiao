<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MentorCR - Aluno</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg-pattern"></div>
<div class="loading" id="loading"><div class="spinner"></div></div>
<div class="panel-header">
    <div class="brand"><svg viewBox="0 0 30 30"><rect x="2" y="2" width="26" height="26" rx="7" fill="url(#grad)"/><text x="15" y="19" text-anchor="middle" fill="#060b14" font-size="11" font-weight="700">CR</text><defs><linearGradient id="grad"><stop offset="0%" stop-color="#5eead4"/><stop offset="100%" stop-color="#818cf8"/></linearGradient></defs></svg><h2>MentorCR</h2></div>
    <div style="display:flex;align-items:center;gap:8px"><span id="nomeHeader" style="font-size:10px;color:var(--text-secondary)"></span><button class="btn-logout" onclick="logout()">Sair</button></div>
</div>
<div class="panel-content">
    <div class="tabs" id="alunoTabs">
        <button class="tab active" data-tab="turma">Turma</button>
        <button class="tab" data-tab="encontros">Encontros</button>
        <button class="tab" data-tab="trabalhos">Trabalhos</button>
        <button class="tab" data-tab="financeiro">Financeiro</button>
        <button class="tab" data-tab="biblioteca">Biblioteca</button>
        <button class="tab" data-tab="perfil">Perfil</button>
    </div>
    <div id="turma" class="tab-content active"><h3 class="section-title">Minha Turma</h3><div id="infoTurma"></div></div>
    <div id="encontros" class="tab-content"><h3 class="section-title">Encontros</h3><div class="table-container"><table><thead><tr><th>Data</th><th>Horario</th><th>Google Meet</th><th>Material</th></tr></thead><tbody id="tabelaEncontros"></tbody></table></div></div>
    <div id="trabalhos" class="tab-content"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><h3 class="section-title" style="margin:0">Trabalhos (<span id="contador">0/2</span>)</h3><button class="btn btn-primary" id="btnEnviar" onclick="openModal('modalEnvio')">Enviar</button></div><div class="table-container"><table><thead><tr><th>Trabalho</th><th>Envio</th><th>Status</th><th>Barema</th><th>Devolutiva</th><th>Arquivo Corrigido</th></tr></thead><tbody id="tabelaTrabalhos"></tbody></table></div></div>
    <div id="financeiro" class="tab-content"><h3 class="section-title">Financeiro</h3><div class="table-container"><table><thead><tr><th>Referencia</th><th>Valor</th><th>Vencimento</th><th>Status</th></tr></thead><tbody id="tabelaFinanceiro"></tbody></table></div></div>
    <div id="biblioteca" class="tab-content"><h3 class="section-title">Biblioteca</h3><div class="biblioteca-grid" id="gridBiblioteca"></div></div>
    <div id="perfil" class="tab-content"><h3 class="section-title">Meu Perfil</h3><div class="profile-section"><div style="text-align:center"><div class="profile-avatar" id="alunoAvatar">A</div><input type="file" id="alunoPhoto" accept="image/*" style="display:none" onchange="atualizarFoto()"><button class="btn btn-outline btn-sm" onclick="document.getElementById('alunoPhoto').click()">Alterar Foto</button></div><div class="profile-info"><div class="form-group"><label>Nome</label><input type="text" id="alunoNomePerfil"></div><div class="form-group"><label>Email</label><input type="email" id="alunoEmailPerfil"></div><div class="form-group"><label>Nova Senha</label><input type="password" id="alunoSenhaPerfil" placeholder="Manter senha atual"></div><button class="btn btn-primary" onclick="salvarPerfil()">Salvar</button></div></div></div>
</div>

<div id="modalEnvio" class="modal"><div class="modal-content"><div class="modal-header"><h3>Enviar Trabalho</h3><button class="modal-close" onclick="closeModal('modalEnvio')">&times;</button></div><form id="formEnvio"><div class="form-group"><label>Titulo do Trabalho</label><input type="text" id="trabTitulo" required></div><div class="form-group"><label>Arquivo (PDF, DOCX, etc)</label><input type="file" id="trabArquivo" required></div><button type="submit" class="btn btn-primary" style="width:100%">Enviar para Revisao</button></form></div></div>

<div class="footer">Criado por <span>Matheus Pacifico Evangelista</span> | <a href="https://wa.me/5579996458399">(79) 99645-8399</a></div>
<script src="supabase.js"></script>
<script>
const userId=localStorage.getItem('mentorcr_user_id'),userNome=localStorage.getItem('mentorcr_user_nome');
if(!userId)window.location.href='index.html';
currentUserId=userId;$('nomeHeader').textContent=userNome||'Aluno';

document.querySelectorAll('#alunoTabs .tab').forEach(t=>{t.addEventListener('click',function(){document.querySelectorAll('#alunoTabs .tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));this.classList.add('active');const el=$(this.dataset.tab);if(el)el.classList.add('active');const a={turma:carregarTurma,encontros:carregarEncontros,trabalhos:carregarTrabalhos,financeiro:carregarFinanceiro,biblioteca:carregarBiblioteca,perfil:carregarPerfil};if(a[this.dataset.tab])a[this.dataset.tab]()})});

async function carregarTurma(){const{data:a}=await sb.from('alunos').select('turma_id').eq('id',currentUserId).single();if(!a||!a.turma_id){$('infoTurma').innerHTML='<div class="empty-state">Nao matriculado</div>';return}const{data:t}=await sb.from('turmas').select('*').eq('id',a.turma_id).single();if(!t){$('infoTurma').innerHTML='<div class="empty-state">Turma nao encontrada</div>';return}const{data:p}=await sb.from('professores').select('nome').eq('id',t.professor_id).single();$('infoTurma').innerHTML=`<div class="card" style="max-width:400px"><div class="card-icon" style="background:rgba(94,234,212,.1);color:var(--primary)">T</div><h3>${t.nome}</h3><p style="font-size:9px;color:var(--text-secondary)">${t.descricao}</p><p style="font-size:8px"><b>Professor:</b> ${p?p.nome:'-'} | <b>Carga:</b> ${t.carga} | <b>Valor:</b> R$ ${Number(t.valor).toFixed(2)}</p></div>`}

async function carregarEncontros(){const{data:a}=await sb.from('alunos').select('turma_id').eq('id',currentUserId).single();if(!a||!a.turma_id){$('tabelaEncontros').innerHTML='<tr><td colspan="4" class="empty-state">Nao matriculado</td></tr>';return}const{data:e}=await sb.from('encontros').select('*').eq('turma_id',a.turma_id).order('data',{ascending:true});$('tabelaEncontros').innerHTML=(!e||e.length===0)?'<tr><td colspan="4" class="empty-state">Nenhum</td></tr>':e.map(x=>`<tr><td>${x.data}</td><td>${x.hora}</td><td><a href="${x.link_meet}" target="_blank">Meet</a></td><td><a href="${x.link_material}" target="_blank">Material</a></td></tr>`).join('')}

async function enviarTrabalho(e){e.preventDefault();const{data:tr}=await sb.from('trabalhos').select('data_envio').eq('aluno_id',currentUserId);const mes=new Date().getMonth();const tm=tr?tr.filter(t=>new Date(t.data_envio).getMonth()===mes):[];if(tm.length>=2){alert('Limite de 2 trabalhos por mes!');return}const{data:a}=await sb.from('alunos').select('turma_id').eq('id',currentUserId).single();const arq=$('trabArquivo');if(!arq.files[0]){alert('Selecione um arquivo.');return}const reader=new FileReader();reader.onload=async function(ev){showLoading();await sb.from('trabalhos').insert({id:uid(),aluno_id:currentUserId,turma_id:a?a.turma_id:null,titulo:$('trabTitulo').value,data_envio:new Date().toISOString().split('T')[0],status:'aguardando',arquivo_original:ev.target.result,nome_arquivo_original:arq.files[0].name});hideLoading();closeModal('modalEnvio');$('formEnvio').reset();carregarTrabalhos();toast('Trabalho enviado!')};reader.readAsDataURL(arq.files[0])}

async function carregarTrabalhos(){const{data:tr}=await sb.from('trabalhos').select('*').eq('aluno_id',currentUserId).order('created_at',{ascending:false});const mes=new Date().getMonth();const tm=tr?tr.filter(t=>new Date(t.data_envio).getMonth()===mes):[];$('contador').textContent=`${tm.length}/2`;$('btnEnviar').disabled=tm.length>=2;$('tabelaTrabalhos').innerHTML=(!tr||tr.length===0)?'<tr><td colspan="6" class="empty-state">Nenhum</td></tr>':tr.map(t=>{let b='-';if(t.barema)b=`${(t.barema.clareza||0)+(t.barema.fundamentacao||0)+(t.barema.estrutura||0)+(t.barema.originalidade||0)}/40`;const st=t.status==='devolvido'?'<span class="badge badge-success">Devolvido</span>':'<span class="badge badge-warning">Aguardando</span>';const down=t.status==='devolvido'&&t.arquivo_corrigido?`<button class="btn btn-outline btn-xs" onclick="baixarArquivo('${t.id}')">Download</button>`:'-';return`<tr><td>${t.titulo}</td><td>${t.data_envio}</td><td>${st}</td><td>${b}</td><td style="max-width:150px;overflow:hidden;text-overflow:ellipsis">${t.devolutiva||'-'}</td><td>${down}</td></tr>`}).join('')}

async function baixarArquivo(tid){const{data:t}=await sb.from('trabalhos').select('*').eq('id',tid).single();if(!t||!t.arquivo_corrigido){alert('Arquivo nao disponivel.');return}const a=document.createElement('a');a.href=t.arquivo_corrigido;a.download=t.nome_arquivo_corrigido||'trabalho_corrigido';document.body.appendChild(a);a.click();document.body.removeChild(a)}

async function carregarFinanceiro(){const{data:p}=await sb.from('pagamentos').select('*').eq('aluno_id',currentUserId);if(!p||p.length===0){$('tabelaFinanceiro').innerHTML='<tr><td colspan="4" class="empty-state">Nenhum</td></tr>';return}const{data:t}=await sb.from('turmas').select('id,nome');const mt={};if(t)t.forEach(x=>mt[x.id]=x.nome);$('tabelaFinanceiro').innerHTML=p.map(x=>`<tr><td>${mt[x.turma_id]||'-'}</td><td>R$ ${Number(x.valor).toFixed(2)}</td><td>${x.vencimento}</td><td>${x.status==='pago'?'<span class="badge badge-success">Pago</span>':'<span class="badge badge-warning">Pendente</span>'}</td></tr>`).join('')}

async function carregarBiblioteca(){const{data}=await sb.from('biblioteca').select('*').order('created_at',{ascending:false});$('gridBiblioteca').innerHTML=(!data||data.length===0)?'<div class="empty-state">Nenhum material</div>':data.map(b=>`<div class="biblioteca-item"><h4>${b.titulo}</h4><p>${b.descricao}</p><a href="${b.link}" target="_blank">Acessar</a></div>`).join('')}

async function carregarPerfil(){const{data}=await sb.from('alunos').select('*').eq('id',currentUserId).single();if(data){$('alunoNomePerfil').value=data.nome;$('alunoEmailPerfil').value=data.email}const{data:ft}=await sb.from('fotos_perfil').select('foto_base64').eq('user_key','aluno_'+currentUserId).single();const el=$('alunoAvatar');el.innerHTML=ft?`<img src="${ft.foto_base64}" style="width:100%;height:100%;object-fit:cover">`:'A'}
async function atualizarFoto(){const f=$('alunoPhoto').files[0];if(!f)return;const r=new FileReader();r.onload=async e=>{showLoading();await sb.from('fotos_perfil').upsert({id:uid(),user_key:'aluno_'+currentUserId,foto_base64:e.target.result},{onConflict:'user_key'});hideLoading();carregarPerfil();toast('Foto atualizada!')};r.readAsDataURL(f)}
async function salvarPerfil(){const d={nome:$('alunoNomePerfil').value,email:$('alunoEmailPerfil').value};const s=$('alunoSenhaPerfil').value;if(s)d.senha=s;showLoading();await sb.from('alunos').update(d).eq('id',currentUserId);hideLoading();$('nomeHeader').textContent=d.nome;localStorage.setItem('mentorcr_user_nome',d.nome);toast('Perfil atualizado!')}

$('formEnvio').addEventListener('submit',enviarTrabalho);
carregarTurma();
</script>
</body>
</html>
