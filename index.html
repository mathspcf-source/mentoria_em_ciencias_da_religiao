<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MentorCR - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root{--bg:#f7fafc;--primary:#3182ce;--primary-dark:#2b6cb0;--gold:#b8860b;--text:#2d3748;--text-light:#718096;--border:#e2e8f0;--danger:#e53e3e}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter','Segoe UI',system-ui,sans-serif;background:linear-gradient(180deg,#f7fafc 0%,#edf2f7 100%);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}
        .loading{display:none;position:fixed;inset:0;background:rgba(255,255,255,.7);backdrop-filter:blur(2px);z-index:9999;justify-content:center;align-items:center}
        .loading.show{display:flex}
        .spinner{width:38px;height:38px;border:3px solid #e2e8f0;border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .login-wrapper{width:100%;max-width:420px;padding:20px}
        .login-card{background:#fff;border-radius:12px;padding:38px 32px;box-shadow:0 6px 24px rgba(0,0,0,.06);border:1px solid var(--border);text-align:center;border-top:4px solid var(--primary)}
        .login-card svg{width:56px;height:56px;margin-bottom:14px}
        .login-card h1{font-family:'Georgia',serif;font-size:24px;font-weight:600;color:#1a365d;margin-bottom:4px;letter-spacing:-.3px}
        .login-card .subtitle{font-size:11px;color:var(--text-light);margin-bottom:26px;font-style:italic}
        .form-group{margin-bottom:13px;text-align:left}
        .form-group label{display:block;font-size:10px;font-weight:500;color:var(--text-light);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
        .form-group select,.form-group input{width:100%;padding:10px 14px;background:#f7fafc;border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text);font-family:inherit;transition:all .15s}
        .form-group select:focus,.form-group input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(49,130,206,.06);background:#fff}
        .form-group select option{background:#fff;color:var(--text)}
        .btn-login{width:100%;padding:13px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;margin-top:8px;font-family:inherit;transition:all .15s;box-shadow:0 3px 8px rgba(49,130,206,.2)}
        .btn-login:hover{background:var(--primary-dark);box-shadow:0 5px 14px rgba(49,130,206,.25)}
        .login-error{color:var(--danger);font-size:11px;text-align:center;margin-top:12px;display:none}
        .footer{position:fixed;bottom:0;left:0;right:0;padding:10px;text-align:center;font-size:9px;color:var(--text-light);background:#fff;border-top:1px solid var(--border)}
        .footer span{color:var(--primary);font-weight:500}
    </style>
</head>
<body>
<div class="loading" id="loading"><div class="spinner"></div></div>
<div class="login-wrapper">
    <div class="login-card">
        <svg viewBox="0 0 52 52"><defs><linearGradient id="lg"><stop offset="0%" stop-color="#1a365d"/><stop offset="100%" stop-color="#3182ce"/></linearGradient></defs><rect x="3" y="3" width="46" height="46" rx="10" fill="url(#lg)"/><text x="26" y="33" text-anchor="middle" fill="#fff" font-size="18" font-weight="600">CR</text></svg>
        <h1>MentorCR</h1>
        <p class="subtitle">Mentoria em Ciencias da Religiao</p>
        <div class="form-group"><label>Tipo de Acesso</label><select id="loginTipo"><option value="admin">Administrador</option><option value="professor">Professor</option><option value="aluno">Aluno</option></select></div>
        <div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="email@exemplo.com"></div>
        <div class="form-group"><label>Senha</label><input type="password" id="loginSenha" placeholder="********"></div>
        <button class="btn-login" id="btnLogin">Entrar</button>
        <p class="login-error" id="loginError"></p>
    </div>
</div>
<div class="footer">Criado por <span>Matheus Pacifico Evangelista</span> | <a href="https://wa.me/5579996458399" style="color:#38a169;text-decoration:none">(79) 99645-8399</a></div>
<script src="supabase.js"></script>
<script>
$('btnLogin').addEventListener('click',async()=>{
    const t=$('loginTipo').value,e=$('loginEmail').value.trim(),s=$('loginSenha').value.trim(),r=$('loginError');
    r.style.display='none';
    if(!e||!s){r.textContent='Preencha todos os campos.';r.style.display='block';return}
    showLoading();
    try{
        if(t==='admin'){
            const{data:c}=await sb.from('configuracoes').select('valor').eq('chave','admin_senha').single();
            if(e===ADMIN_EMAIL&&s===(c?c.valor:'admin123')){
                criarSessao('admin','admin','Administrador');
                window.location.href='admin.html';
            }else{r.textContent='Email ou senha incorretos.';r.style.display='block'}
        }else if(t==='professor'){
            const{data:p}=await sb.from('professores').select('*').eq('email',e).eq('senha',s).eq('ativo',true);
            if(p&&p.length>0){
                criarSessao('professor',p[0].id,p[0].nome);
                window.location.href='professor.html';
            }else{r.textContent='Email ou senha incorretos.';r.style.display='block'}
        }else{
            const{data:a}=await sb.from('alunos').select('*').eq('email',e).eq('senha',s).eq('ativo',true);
            if(a&&a.length>0){
                criarSessao('aluno',a[0].id,a[0].nome);
                window.location.href='aluno.html';
            }else{r.textContent='Email ou senha incorretos.';r.style.display='block'}
        }
    }catch(ex){r.textContent='Erro de conexao.';r.style.display='block'}
    hideLoading()
});
</script>
</body>
</html>
