<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MentorCR - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-wrapper { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 16px; position: relative; z-index: 1; }
        .login-card { background: var(--surface); border-radius: 12px; padding: 28px 24px; width: 100%; max-width: 340px; box-shadow: 0 16px 48px rgba(0,0,0,.5); border: 1px solid var(--border); }
        .login-card::before { content: ''; display: block; height: 2px; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 12px 12px 0 0; margin: -28px -24px 20px -24px; }
        .login-header { text-align: center; margin-bottom: 18px; }
        .login-header svg { width: 48px; height: 48px; }
        .login-header h1 { font-size: 20px; font-weight: 600; color: var(--text-bright); margin-top: 6px; }
        .login-header p { color: var(--text-secondary); font-size: 10px; margin-top: 2px; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; font-size: 9px; font-weight: 600; color: var(--primary); text-transform: uppercase; margin-bottom: 3px; }
        .form-group select, .form-group input { width: 100%; padding: 9px 12px; background: var(--surface-light); border: 1px solid var(--border); border-radius: 6px; color: var(--text-bright); font-size: 12px; font-family: inherit; }
        .form-group select:focus, .form-group input:focus { outline: none; border-color: var(--primary); }
        .form-group select option { background: var(--surface); color: var(--text); }
        .btn-login { width: 100%; padding: 10px; background: var(--primary); color: #0a0f18; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 4px; transition: var(--transition); }
        .btn-login:hover { background: var(--primary-dark); }
        .login-error { color: var(--danger); font-size: 10px; text-align: center; margin-top: 8px; display: none; }
    </style>
</head>
<body>
<div class="bg-pattern"></div>
<div class="loading" id="loading"><div class="spinner"></div></div>
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-header">
            <svg viewBox="0 0 52 52"><defs><linearGradient id="lg"><stop offset="0%" stop-color="#5eead4"/><stop offset="100%" stop-color="#818cf8"/></linearGradient></defs><rect x="3" y="3" width="46" height="46" rx="13" fill="url(#lg)"/><text x="26" y="32" text-anchor="middle" fill="#0a0f18" font-size="19" font-weight="700">CR</text></svg>
            <h1>MentorCR</h1><p>Mentoria em Ciencias da Religiao</p>
        </div>
        <div class="form-group"><label>Tipo de Acesso</label><select id="loginTipo"><option value="admin">Administrador</option><option value="professor">Professor</option><option value="aluno">Aluno</option></select></div>
        <div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="email@exemplo.com"></div>
        <div class="form-group"><label>Senha</label><input type="password" id="loginSenha" placeholder="********"></div>
        <button class="btn-login" id="btnLogin">Entrar</button><p class="login-error" id="loginError"></p>
    </div>
</div>
<div class="footer">Criado por <span>Matheus Pacifico Evangelista</span> | <a href="https://wa.me/5579996458399">(79) 99645-8399</a></div>
<script src="supabase.js"></script>
<script>
$('btnLogin').addEventListener('click', async () => {
    const tipo = $('loginTipo').value, email = $('loginEmail').value.trim(), senha = $('loginSenha').value.trim(), err = $('loginError');
    err.style.display = 'none';
    if (!email || !senha) { err.textContent = 'Preencha todos os campos.'; err.style.display = 'block'; return; }
    showLoading();
    try {
        if (tipo === 'admin') {
            const { data: cfg } = await sb.from('configuracoes').select('valor').eq('chave','admin_senha').single();
            if (email === ADMIN_EMAIL && senha === (cfg?cfg.valor:'admin123')) window.location.href = 'admin.html';
            else { err.textContent = 'Email ou senha incorretos.'; err.style.display = 'block'; }
        } else if (tipo === 'professor') {
            const { data: profs } = await sb.from('professores').select('*').eq('email',email).eq('senha',senha).eq('ativo',true);
            if (profs && profs.length > 0) {
                localStorage.setItem('mentorcr_user_id', profs[0].id);
                localStorage.setItem('mentorcr_user_nome', profs[0].nome);
                localStorage.setItem('mentorcr_user_tipo', 'professor');
                window.location.href = 'professor.html';
            } else { err.textContent = 'Email ou senha incorretos.'; err.style.display = 'block'; }
        } else {
            const { data: als } = await sb.from('alunos').select('*').eq('email',email).eq('senha',senha).eq('ativo',true);
            if (als && als.length > 0) {
                localStorage.setItem('mentorcr_user_id', als[0].id);
                localStorage.setItem('mentorcr_user_nome', als[0].nome);
                localStorage.setItem('mentorcr_user_tipo', 'aluno');
                window.location.href = 'aluno.html';
            } else { err.textContent = 'Email ou senha incorretos.'; err.style.display = 'block'; }
        }
    } catch(e) { err.textContent = 'Erro de conexao.'; err.style.display = 'block'; }
    hideLoading();
});
</script>
</body>
</html>
